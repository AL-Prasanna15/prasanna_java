<!DOCTYPE html>
<html>
<head>
<title>Different Column Table</title>
</head>
<body>

<table border="1" width="50%" align="center">

<!-- Row 1 (1 column) -->
<tr>
<td colspan="5" align="center">Row 1 - 1 Column</td>
</tr>

<!-- Row 2 (3 columns) -->
<tr>
<td colspan="2" align="center">Col 1</td>
<td colspan="2" align="center">Col 2</td>
<td align="center">Col 3</td>
</tr>

<!-- Row 3 (5 columns) -->
<tr>
<td>1</td>
<td>2</td>
<td>3</td>
<td>4</td>
<td>5</td>
</tr>

</table>

</body>
</html>
